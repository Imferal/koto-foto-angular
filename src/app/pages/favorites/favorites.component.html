@if (!favoriteCats) {
  <p class="no-favorites">
    У вас пока нет любимых котиков. Что вы за человек-то такой? :(
  </p>
} @else {
  <div class="gallery">
    @for (cat of favoriteCats; track cat) {
      <app-cat-card
        [cat]="cat"
        (toggleFavorite)="getFavoriteCats()"
        >
      </app-cat-card>
    }
  </div>
}

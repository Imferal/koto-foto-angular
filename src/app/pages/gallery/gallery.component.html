<mat-spinner *ngIf="loading" class="spinner"></mat-spinner>

<p *ngIf="error">
  {{ error }}
</p>

<div *ngIf="!loading && !error" class="gallery">
  <app-cat-card *ngFor="let cat of cats; trackBy(trackById)"
                [cat]="cat"
    >
  </app-cat-card>
</div>

<div class="button-container">
  <button mat-raised-button
          color="primary"
          (click)="getCats()">Больше котиков!</button>
</div>

@if (loading) {
  <mat-spinner class="spinner"></mat-spinner>
}

@if (error) {
  <p>
    {{ error }}
  </p>
}

@if (!loading && !error) {
  <div class="gallery">
    @for (cat of cats; track cat) {
      <app-cat-card
        [cat]="cat"
        >
      </app-cat-card>
    }
  </div>
}

<div class="button-container">
  <button mat-raised-button
    color="primary"
  (click)="getCats()">Больше котиков!</button>
</div>

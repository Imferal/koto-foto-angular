<mat-card class="card">
  <mat-card-content class="card__container">
    <img [src]="cat.url" alt="#" (click)="handlePhotoClick()">

    <div (click)="handleFavoriteButtonClick()"
      [ngClass]="{
      'favorite-button': true,
      active: isFavorite
    }">♥</div>
  </mat-card-content>
</mat-card>

<mat-card class="card">
  <mat-card-content class="card__container">
    <a [routerLink]="['/photo', cat.id]">
      <img [src]="cat.url" alt="#">
    </a>

    <div (click)="handleFavoriteButtonClick()"
      [ngClass]="{
      'favorite-button': true,
      active: isFavorite
    }">♥</div>
  </mat-card-content>
</mat-card>
